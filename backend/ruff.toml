line-length = 100
target-version = "py311"

[lint]
# pycodestyle errors (E), pyflakes (F), isort (I), bugbear (B).
select = ["E", "F", "I", "B"]
ignore = [
    "E501",  # line length is enforced softly; long prompt strings are fine
    "B008",  # FastAPI uses File()/Form() calls in argument defaults by design
]

[lint.per-file-ignores]
"tests/*" = ["B011"]
